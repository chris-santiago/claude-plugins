<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 500" font-family="Helvetica,Arial,sans-serif">
<text x="540.0" y="34.0" font-size="23" fill="#1a4a7a" text-anchor="middle" font-weight="bold">Two kinds of work — routed by one question</text>
<rect x="440.0" y="66.0" width="200.0" height="58.0" rx="8" fill="#fff" stroke="#6b7280" stroke-width="2"/>
<text x="540.0" y="101.0" font-size="20" fill="#1a1a2e" text-anchor="middle" font-weight="bold">A change to make</text>
<polygon points="540.0,126.0 690.0,200.0 540.0,274.0 390.0,200.0" fill="#fde8cc" stroke="#d97706" stroke-width="2"/>
<text x="540.0" y="194.0" font-size="17" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Is “what to build”</text>
<text x="540.0" y="216.0" font-size="17" fill="#1a1a2e" text-anchor="middle" font-weight="bold">already settled?</text>
<line x1="540.0" y1="124.0" x2="540.0" y2="124.0" stroke="#6b7280" stroke-width="2.2"/>
<polygon points="540.0,124.0 540.0,124.0 540.0,124.0" fill="#6b7280"/>
<line x1="390.0" y1="200.0" x2="250.0" y2="200.0" stroke="#6b7280" stroke-width="2.2"/>
<polygon points="250.0,200.0 259.0,195.1 259.0,204.9" fill="#6b7280"/>
<text x="335.0" y="190.0" font-size="16" fill="#b91c1c" text-anchor="middle" font-weight="bold">NO</text>
<rect x="70.0" y="148.0" width="180.0" height="104.0" rx="8" fill="#eaf1f8" stroke="#1a4a7a" stroke-width="2"/>
<text x="160.0" y="198.0" font-size="19" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Design-open</text>
<text x="160.0" y="216.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">“what should this be?”</text>
<text x="160.0" y="232.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">is still live</text>
<text x="160.0" y="248.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal"></text>
<text x="160.0" y="264.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">→ brainstorming</text>
<line x1="690.0" y1="200.0" x2="830.0" y2="200.0" stroke="#6b7280" stroke-width="2.2"/>
<polygon points="830.0,200.0 821.0,204.9 821.0,195.1" fill="#6b7280"/>
<text x="748.0" y="190.0" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">YES</text>
<rect x="830.0" y="148.0" width="180.0" height="104.0" rx="8" fill="#e4f0e6" stroke="#15803d" stroke-width="2"/>
<text x="920.0" y="198.0" font-size="19" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Determined</text>
<text x="920.0" y="216.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">behavior settled;</text>
<text x="920.0" y="232.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">only the “how” is open</text>
<text x="920.0" y="248.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal"></text>
<text x="920.0" y="264.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">→ coherent-change</text>
<line x1="160.0" y1="252.0" x2="160.0" y2="400.0" stroke="#1a4a7a" stroke-width="1.8" stroke-dasharray="5,4"/>
<line x1="160.0" y1="400.0" x2="470.0" y2="400.0" stroke="#1a4a7a" stroke-width="1.8" stroke-dasharray="5,4"/>
<polygon points="470.0,400.0 461.0,404.9 461.0,395.1" fill="#1a4a7a"/>
<text x="300.0" y="388.0" font-size="14" fill="#1a4a7a" text-anchor="middle" font-weight="normal" font-style="italic">settles the design</text>
<rect x="470.0" y="372.0" width="200.0" height="58.0" rx="8" fill="#fff" stroke="#6b7280" stroke-width="2"/>
<text x="570.0" y="407.0" font-size="19" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Spec → plan → build</text>
<line x1="920.0" y1="252.0" x2="920.0" y2="401.0" stroke="#15803d" stroke-width="1.8" stroke-dasharray="5,4"/>
<line x1="920.0" y1="401.0" x2="672.0" y2="401.0" stroke="#15803d" stroke-width="1.8" stroke-dasharray="5,4"/>
<polygon points="672.0,401.0 681.0,396.1 681.0,405.9" fill="#15803d"/>
<text x="540.0" y="470.0" font-size="16" fill="#6b7280" text-anchor="middle" font-weight="normal" font-style="italic">Determined ≠ trivial: the behavior is fixed, but many implementations pass — only one fits the codebase.</text>
</svg>