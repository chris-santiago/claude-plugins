<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 500" font-family="Helvetica,Arial,sans-serif">
<text x="560.0" y="32.0" font-size="23" fill="#1a4a7a" text-anchor="middle" font-weight="bold">Dispatch is lossless only if the “why” is written down</text>
<rect x="60.0" y="150.0" width="210.0" height="120.0" rx="8" fill="#eaf1f8" stroke="#1a4a7a" stroke-width="2"/>
<text x="165.0" y="208.0" font-size="21" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Orchestrator</text>
<text x="165.0" y="226.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">holds the conversation</text>
<text x="165.0" y="242.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">— and the intent</text>
<rect x="360.0" y="120.0" width="220.0" height="180.0" rx="8" fill="#fff" stroke="#d97706" stroke-width="2"/>
<text x="470.0" y="146.0" font-size="19" fill="#d97706" text-anchor="middle" font-weight="bold">The brief</text>
<line x1="376.0" y1="160.0" x2="564.0" y2="160.0" stroke="#d1d5db" stroke-width="1.5"/>
<text x="378.0" y="186.0" font-size="15" fill="#1a1a2e" text-anchor="start" font-weight="normal">pointers:</text>
<text x="468.0" y="186.0" font-size="12.5" fill="#6b7280" text-anchor="start" font-weight="normal">“contract built in Task 3 → path”</text>
<text x="378.0" y="216.0" font-size="15" fill="#1a1a2e" text-anchor="start" font-weight="normal">spec §§:</text>
<text x="468.0" y="216.0" font-size="12.5" fill="#6b7280" text-anchor="start" font-weight="normal">sections to read</text>
<text x="378.0" y="246.0" font-size="15" fill="#1a1a2e" text-anchor="start" font-weight="normal">constraints:</text>
<text x="468.0" y="246.0" font-size="12.5" fill="#6b7280" text-anchor="start" font-weight="normal">verbatim</text>
<text x="378.0" y="276.0" font-size="15" fill="#d97706" text-anchor="start" font-weight="bold">INTENT:</text>
<text x="468.0" y="276.0" font-size="12.5" fill="#6b7280" text-anchor="start" font-weight="normal">the outcome to produce</text>
<line x1="270.0" y1="210.0" x2="356.0" y2="210.0" stroke="#6b7280" stroke-width="2.2"/>
<polygon points="356.0,210.0 347.0,214.9 347.0,205.1" fill="#6b7280"/>
<rect x="690.0" y="150.0" width="210.0" height="120.0" rx="8" fill="#e4f0e6" stroke="#15803d" stroke-width="2"/>
<text x="795.0" y="208.0" font-size="19" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Fresh coder agent</text>
<text x="795.0" y="226.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">scope-matched;</text>
<text x="795.0" y="242.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">no conversation history</text>
<line x1="584.0" y1="210.0" x2="686.0" y2="210.0" stroke="#6b7280" stroke-width="2.2"/>
<polygon points="686.0,210.0 677.0,214.9 677.0,205.1" fill="#6b7280"/>
<text x="795.0" y="300.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal" font-style="italic">reads → spec, repo, the files it touches</text>
<rect x="360.0" y="372.0" width="700.0" height="100.0" rx="8" fill="#eef0f2" stroke="#d1d5db" stroke-width="1.5"/>
<text x="710.0" y="400.0" font-size="17" fill="#1a1a2e" text-anchor="middle" font-weight="bold">what &amp; where  →  recoverable by reading</text>
<text x="710.0" y="430.0" font-size="17" fill="#b91c1c" text-anchor="middle" font-weight="bold">why  →  recoverable from nothing; it lived in your head</text>
<text x="710.0" y="456.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal" font-style="italic">so the brief must carry it — hand over only what &amp; where, and a coder ships the wrong thing correctly.</text>
<text x="155.0" y="320.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="bold">return leg:</text>
<text x="155.0" y="342.0" font-size="13" fill="#6b7280" text-anchor="middle" font-weight="normal">reports are compressions.</text>
<text x="155.0" y="360.0" font-size="13" fill="#6b7280" text-anchor="middle" font-weight="normal">re-read the code slice,</text>
<text x="155.0" y="378.0" font-size="13" fill="#6b7280" text-anchor="middle" font-weight="normal">don’t trust the summary.</text>
</svg>