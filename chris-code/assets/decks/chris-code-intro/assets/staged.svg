<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" font-family="Helvetica,Arial,sans-serif">
<text x="500.0" y="32.0" font-size="22" fill="#1a4a7a" text-anchor="middle" font-weight="bold">Staged parallelism — safety by scheduling, not prohibition</text>
<text x="70.0" y="108.0" font-size="17" fill="#1a4a7a" text-anchor="start" font-weight="bold">Stage 1</text>
<rect x="200.0" y="82.0" width="180.0" height="56.0" rx="8" fill="#e4f0e6" stroke="#15803d" stroke-width="1.8"/>
<text x="290.0" y="106.0" font-size="18" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Task A</text>
<text x="290.0" y="126.0" font-size="12.5" fill="#6b7280" text-anchor="middle" font-weight="normal" font-family="SFMono-Regular,Menlo,monospace">parser.py</text>
<rect x="410.0" y="82.0" width="180.0" height="56.0" rx="8" fill="#e4f0e6" stroke="#15803d" stroke-width="1.8"/>
<text x="500.0" y="106.0" font-size="18" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Task B</text>
<text x="500.0" y="126.0" font-size="12.5" fill="#6b7280" text-anchor="middle" font-weight="normal" font-family="SFMono-Regular,Menlo,monospace">cli.py</text>
<text x="720.0" y="110.0" font-size="14" fill="#15803d" text-anchor="start" font-weight="normal" font-style="italic">disjoint files → run in parallel</text>
<line x1="70.0" y1="162.0" x2="930.0" y2="162.0" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,4"/>
<text x="500.0" y="178.0" font-size="13" fill="#6b7280" text-anchor="middle" font-weight="normal" font-style="italic">barrier: wait for all reviews to pass</text>
<text x="70.0" y="226.0" font-size="17" fill="#1a4a7a" text-anchor="start" font-weight="bold">Stage 2</text>
<rect x="200.0" y="200.0" width="180.0" height="56.0" rx="8" fill="#fde8cc" stroke="#d97706" stroke-width="1.8"/>
<text x="290.0" y="224.0" font-size="18" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Task C</text>
<text x="290.0" y="244.0" font-size="12.5" fill="#6b7280" text-anchor="middle" font-weight="normal" font-family="SFMono-Regular,Menlo,monospace">parser.py</text>
<text x="410.0" y="228.0" font-size="14" fill="#d97706" text-anchor="start" font-weight="normal" font-style="italic">touches parser.py again → must wait for Task A</text>
<line x1="70.0" y1="280.0" x2="930.0" y2="280.0" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,4"/>
<text x="500.0" y="296.0" font-size="13" fill="#6b7280" text-anchor="middle" font-weight="normal" font-style="italic">barrier</text>
<text x="70.0" y="344.0" font-size="17" fill="#1a4a7a" text-anchor="start" font-weight="bold">Stage 3</text>
<rect x="200.0" y="318.0" width="180.0" height="56.0" rx="8" fill="#e4f0e6" stroke="#15803d" stroke-width="1.8"/>
<text x="290.0" y="342.0" font-size="18" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Task D</text>
<text x="290.0" y="362.0" font-size="12.5" fill="#6b7280" text-anchor="middle" font-weight="normal" font-family="SFMono-Regular,Menlo,monospace">io.py</text>
<rect x="410.0" y="318.0" width="180.0" height="56.0" rx="8" fill="#e4f0e6" stroke="#15803d" stroke-width="1.8"/>
<text x="500.0" y="342.0" font-size="18" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Task E</text>
<text x="500.0" y="362.0" font-size="12.5" fill="#6b7280" text-anchor="middle" font-weight="normal" font-family="SFMono-Regular,Menlo,monospace">types.rs</text>
<text x="500.0" y="420.0" font-size="15" fill="#6b7280" text-anchor="middle" font-weight="normal" font-style="italic">The orchestrator maps each task’s file footprint up front; tasks that share a file are serialized, the rest run concurrently.</text>
</svg>