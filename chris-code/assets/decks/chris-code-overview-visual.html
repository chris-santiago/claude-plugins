</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" data-class="lead" data-paginate="true" data-background-color="#fbfbfd" data-color="#1d1d1f" data-header="chris-code" data-footer="5-minute overview" data-theme="gaia" data-style="section { font-size: 26px; }
h1 { color: #1a1a2e; }
h2 { color: #16213e; }
strong { color: #0a5; }
:not(pre):not(marp-pre) &gt; code {
  background: #e8eaf6; color: #283593;
  padding: 1px 6px; border-radius: 4px; font-weight: 500;
}
table { font-size: 22px; }
section.lead h1 { font-size: 56px; }

/* ---- diagram primitives ---- */
.chev { color:#aab; font-size:22px; line-height:1; margin:1px 0; text-align:center; }
.node { display:inline-block; border:1.5px solid #c5cae9; background:#eef1fb; color:#1a1a2e; border-radius:10px; padding:7px 16px; font-weight:600; font-size:19px; }
.design{ background:#e8eaf6; border-color:#9fa8da; }
.exec{ background:#d7f5e3; border-color:#7fd6a6; }
.task{ background:#fff3cd; border-color:#ffd966; }
.done{ background:#e2e8f0; border-color:#aab4c4; }
.flow{ display:flex; flex-direction:column; align-items:center; gap:1px; margin-top:14px; }
.legend{ display:flex; gap:24px; justify-content:center; margin-top:18px; font-size:16px; color:#555; }
.legend span{ display:inline-flex; align-items:center; gap:7px; }
.dot{ width:13px; height:13px; border-radius:3px; display:inline-block; }

/* cards */
.cards{ display:flex; gap:22px; justify-content:center; margin-top:30px; }
.card{ flex:1; background:#fff; border:1px solid #e3e3ee; border-top:5px solid #0a5; border-radius:12px; padding:18px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
.cardnum{ font-size:30px; font-weight:800; color:#0a5; line-height:1; }
.cardttl{ font-weight:700; font-size:20px; margin:8px 0 6px; color:#16213e; }
.cardtxt{ font-size:16px; color:#444; line-height:1.45; }

/* split */
.split{ display:flex; gap:26px; justify-content:center; margin-top:24px; }
.col{ flex:1; border-radius:12px; padding:16px 20px; }
.stay{ background:#e7f7ee; border:1.5px solid #7fd6a6; }
.go{ background:#f3f4f6; border:1.5px solid #cfd3da; }
.colhdr{ font-weight:800; font-size:21px; margin-bottom:10px; }
.stay .colhdr{ color:#0a7a4a; }
.go .colhdr{ color:#7a7f87; }
.col .item{ font-size:18px; padding:4px 0; color:#222; }
.go .item{ color:#999; text-decoration:line-through; }
.col .sub{ margin-top:8px; font-size:15px; color:#666; }

/* dispatch */
.filechip{ display:inline-block; background:#1a1a2e; color:#fff; padding:7px 16px; border-radius:8px; font-weight:600; font-size:19px; }
.dispatch{ text-align:center; margin-top:10px; }
.router{ color:#777; font-size:16px; margin:6px 0; }
.lanes{ display:flex; gap:18px; justify-content:center; margin-top:4px; }
.lane{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
.lanehdr{ font-weight:700; font-size:16px; padding:5px 4px; width:100%; border-radius:7px; }
.green{ background:#d7f5e3; border:1.5px solid #7fd6a6; }
.yellow{ background:#fff3cd; border:1.5px solid #ffd966; }
.red{ background:#ffd9d9; border:1.5px solid #ef9a9a; }
.indigo{ background:#e8eaf6; border:1.5px solid #9fa8da; }
.muted{ background:#f0f0f0; border:1.5px solid #ddd; color:#aaa; text-decoration:line-through; }
.lanenote{ font-size:14px; color:#666; }

/* gates */
.gates{ display:flex; align-items:center; justify-content:center; gap:8px; margin-top:32px; }
.gate{ width:175px; height:104px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:#eef1fb; border:2px solid #9fa8da; border-radius:12px; font-weight:700; font-size:18px; color:#1a1a2e; text-align:center; }
.gnum{ width:26px; height:26px; border-radius:50%; background:#0a5; color:#fff; font-size:15px; display:flex; align-items:center; justify-content:center; }
.garrow{ font-size:26px; color:#9fa8da; }
.cap{ text-align:center; font-size:18px; color:#444; margin-top:24px; }

/* staged parallelism */
.stages{ margin-top:22px; }
.stagerow{ display:flex; align-items:center; gap:16px; margin:6px 0; }
.stagelbl{ width:90px; font-weight:700; color:#16213e; font-size:18px; }
.tasks{ display:flex; gap:12px; }
.t{ background:#d7f5e3; border:1.5px solid #7fd6a6; border-radius:9px; padding:8px 16px; font-weight:600; font-size:18px; }
.tw{ background:#fff3cd; border-color:#ffd966; }
.barrier{ text-align:center; color:#888; font-size:15px; margin:10px 0; border-top:1px dashed #ccc; padding-top:8px; }

/* verification funnel */
.vstack{ display:flex; flex-direction:column; align-items:center; gap:2px; margin-top:16px; }
.vbar{ border-radius:9px; padding:9px 0; font-weight:600; font-size:18px; text-align:center; color:#16213e; background:#e8eaf6; border:1.5px solid #9fa8da; }
.v1{ width:90%; } .v2{ width:78%; } .v3{ width:66%; } .v4{ width:54%; } .v5{ width:42%; }

<header>chris-code</header>
<h2 id="what-it-is">What it is</h2>
<p>A personal <strong>Claude Code plugin</strong> that turns the assistant from a free-form chat tool into a <strong>fixed engineering pipeline</strong>.</p>
<p>Drop it into any repo. Describe a feature (or type <code>/brainstorming</code>) and the workflow takes over:</p>
<blockquote>
<p>brainstorm intent → write a lean spec → hand off a thin plan → dispatch a coder per task → review in stages → gate every commit.</p>
</blockquote>
<p>Derived from <a href="https://github.com/obra/superpowers">obra/superpowers</a>, redesigned around four failures it kept hitting:</p>
<footer>5-minute overview</footer>

<header>chris-code</header>
<h2 id="one-engine-for-every-determined-change">One engine for every determined change</h2>
<p class="cap" style="margin-top:4px">A bug, a refactor, an API alignment, a finding from a review — the behavior is settled, only the <b>implementation</b> is open. chris-code routes them all through a single <b>application engine</b>.</p>
<div class="flow">
<div class="node design">fix &amp; design front-ends &nbsp;·&nbsp; remediating-issues · systematic-debugging · lean-spec</div>
<div class="chev">+</div>
<div class="node design">discovery — <i>propose &amp; hand off</i> &nbsp;·&nbsp; code-archaeology · bug-hunt · python/rust-review</div>
<div class="chev">+</div>
<div class="node design">direct invocation</div>
<div class="chev">↓ &nbsp; feed a <b>determined</b> change</div>
<div class="node exec">coherent-change &nbsp;·&nbsp; research the codebase → defend the most coherent change</div>
</div>
<p class="cap"><b>Discovery is separated from application:</b> audits and reviews propose end-states and hand off — they never land their own patches. Signature output: a <b>defended choice</b> — every candidate rooted in how the codebase already solves it, plus why the chosen one wins.</p>
<footer>5-minute overview</footer>

<header>chris-code</header>
<h2 id="size-the-change--or-batch-the-set">Size the change — or batch the set</h2>
<p class="cap" style="margin-top:4px">After the defended choice, the engine <b>sizes the work</b> and routes it — so no determined change is built bigger than it should be, or smaller.</p>
<div class="cards" style="flex-wrap:wrap; gap:16px">
<div class="card"><div class="cardttl">Single coherent edit</div><div class="cardtxt">Build <b>inline</b> — coder agent → <code>*-review-lite</code> self-gate → hand back. The caller runs the close.</div></div>
<div class="card"><div class="cardttl">Major / multi-task</div><div class="cardtxt">Settled design, not a one-shot build — route it to planned execution: <code>lean-spec</code> → <code>lean-plan</code> → <code>subagent-driven-development</code>.</div></div>
<div class="card"><div class="cardttl">A set of findings — <b>batch</b></div><div class="cardtxt">One consolidated research pass, a defended choice per change, the whole set into <b>one</b> spec → plan → SDD.</div></div>
</div>
<p class="cap">Same defend-and-prove discipline at every scale. A change <b>closes its whole scope</b> — every sibling case its intent reaches — and defers only what's genuinely separate. Ship the change that looks like it was always there.</p>

<h2 id="how-to-use-it">How to use it</h2>
<p>Drop into any repo. Describe a feature, or type <strong><code>/brainstorming</code></strong>.</p>
<p>The workflow designs before it codes, keeps the main context clean by offloading to focused subagents, and <strong>catches agent drift before it reaches <code>main</code></strong>.</p>
